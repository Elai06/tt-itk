services:
  db:
    image: postgres:15
    container_name: tt-itk-db
    restart: unless-stopped
    env_file:
      config.env
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tt-itk-app
    restart: unless-stopped
    env_file:
      - docker/config.env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8081:8081"
    volumes:
      - ./docker/config.env:/app/config.env:ro

volumes:
  postgres_data:
